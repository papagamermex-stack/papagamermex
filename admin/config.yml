backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'es'

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "_noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Autor", name: "author", widget: "string", default: "Eduardo Díaz" }
      - { label: "Imagen destacada", name: "image", widget: "image", required: false }
      - { label: "Categoría", name: "category", widget: "select", options: ["Noticias", "Industria", "México", "Internacional"] }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "resenas"
    label: "Reseñas"
    folder: "_resenas"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título del juego", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Autor", name: "author", widget: "string", default: "Eduardo Díaz" }
      - { label: "Imagen del juego", name: "image", widget: "image", required: false }
      - { label: "Plataforma", name: "platform", widget: "select", options: ["PS5", "Xbox Series X", "Nintendo Switch", "PC", "Móvil", "Multiplataforma"] }
      - { label: "Género", name: "genre", widget: "string" }
      - { label: "Calificación (0-10)", name: "score", widget: "number", min: 0, max: 10, step: 0.5 }
      - { label: "Apto para familia", name: "family_friendly", widget: "boolean", default: false }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "para_padres"
    label: "Para Padres"
    folder: "_para_padres"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Autor", name: "author", widget: "string", default: "Eduardo Díaz" }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - { label: "Categoría", name: "category", widget: "select", options: ["Controles Parentales", "Tiempo de Pantalla", "Juegos Educativos", "Crianza Digital", "Ciberseguridad"] }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "podcast"
    label: "Podcast"
    folder: "_podcast"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título del episodio", name: "title", widget: "string" }
      - { label: "Número de episodio", name: "episode", widget: "number" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Imagen del episodio", name: "image", widget: "image", required: false }
      - { label: "Duración (ej: 52 min)", name: "duration", widget: "string" }
      - { label: "Link Spotify", name: "spotify", widget: "string", required: false }
      - { label: "Link Apple Podcasts", name: "apple", widget: "string", required: false }
      - { label: "Link YouTube", name: "youtube", widget: "string", required: false }
      - { label: "Descripción", name: "excerpt", widget: "text" }
      - { label: "Notas del episodio", name: "body", widget: "markdown" }

  - name: "esports"
    label: "Esports"
    folder: "_esports"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Autor", name: "author", widget: "string", default: "Eduardo Díaz" }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - { label: "Juego", name: "game", widget: "string" }
      - { label: "Tipo", name: "type", widget: "select", options: ["Torneo", "Resultado", "Noticia", "Cobertura"] }
      - { label: "Resumen", name: "excerpt", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }
